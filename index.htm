    <style>
        :root {
            --bg1: #e1abc6;
            --bg2: #ffffff;
            --bg3: #c694a7;

            --pill-bg: rgba(255, 255, 255, 0.22);
            --pill-hover: rgba(255, 255, 255, 0.35);

            --text-main: #121212;
            --text-soft: rgba(10, 10, 10, 0.85);
        }

        * {
            box-sizing: border-box;
            font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }


        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, #000000, #000000, #2d0000);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: -1;
        }

        body.red-mode::before {
            opacity: 1;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;

            background: linear-gradient(120deg, var(--bg1), var(--bg2), var(--bg3));
            background-size: 300% 300%;
            animation: gradientWave 16s ease infinite;

            color: var(--text-main);

            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }


        body.red-mode {
            --text-main: #e0e0e0;
            --text-soft: #b0b0b0;
        }

        body.red-mode .links a {
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes gradientWave {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .content {
            max-width: 720px;
            padding-left: clamp(3rem, 10vw, 12rem);
            padding-right: 2rem;
        }

        h1 {
            margin: 0 0 0.9rem;
            color: var(--text-main);
            font-size: clamp(2.6rem, 4.2vw, 3.6rem);
            font-weight: 800;
            letter-spacing: 0.6px;
        }

        p.bio {
            margin: 0 0 2.2rem;
            font-size: 1.05rem;
            line-height: 1.65;
            color: var(--text-soft);
        }

        .links {
            display: flex;
            gap: 0.9rem;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.55rem 1.05rem;
            border-radius: 999px;
            text-decoration: none;
            color: var(--text-main);
            background: var(--pill-bg);
            backdrop-filter: blur(8px);
            font-weight: 500;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .links a:hover {
            background: var(--pill-hover);
            transform: translateY(-2px);
        }

        .icon {
            width: 16px;
            height: 16px;
            display: inline-block;
            fill: currentColor;
        }

        @media (max-width: 768px) {
            .content {
                padding-left: 2rem;
            }
        }

        /* shake animation */
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-3px);
            }

            40% {
                transform: translateX(3px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* flip */
        @keyframes flipY {
            0% {
                transform: scaleY(1);
            }

            100% {
                transform: scaleY(-1);
            }
        }

        @keyframes heartbeat {
            0% {
                background: var(--pill-bg);
            }

            25% {
                background: rgba(255, 255, 255, 0.2);
            }

            60% {
                background: rgba(255, 255, 255, 0.4);
            }

            100% {
                background: var(--pill-bg);
            }
        }

        #twitter {
            transition: transform 1s cubic-bezier(0, 1, 0, 1), background 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            transform-style: preserve-3d;
            perspective: 1000px;
            touch-action: manipulation;
        }

        .twitter-active {
            transform: rotateX(180deg) !important;
            background: rgba(255, 255, 255, 0.4) !important;
        }

        .twitter-shaking {
            animation: shake 0.2s ease infinite;
        }

        .pulse {
            animation: heartbeat 1.2s ease-out infinite;
        }
    </style>
</head>

    <script>
        const twitter = document.getElementById("twitter");
        const body = document.body;
        const links = document.querySelectorAll(".links a");

        let suppressNextClick = false;
        let holdTimer;
        let isToggled = false;
        const holdThreshold = 600;

        function startHold(e) {
            if (!isToggled) {
                twitter.classList.add("twitter-shaking");
            }

            holdTimer = setTimeout(() => {
                isToggled = !isToggled;
                suppressNextClick = true;

                body.classList.toggle("red-mode", isToggled);
                twitter.classList.toggle("twitter-active", isToggled);

                links.forEach(link => {
                    if (link !== twitter) link.classList.toggle("pulse", isToggled);
                });

                if (navigator.vibrate) navigator.vibrate(50);
                twitter.classList.remove("twitter-shaking");
            }, holdThreshold);
        }

        function cancelHold() {
            clearTimeout(holdTimer);
            twitter.classList.remove("twitter-shaking");
        }

        // mouse
        twitter.addEventListener("mousedown", startHold);
        twitter.addEventListener("mouseup", cancelHold);
        twitter.addEventListener("mouseleave", cancelHold);

        // touch
        twitter.addEventListener("touchstart", (e) => {
            startHold(e);
        });
        twitter.addEventListener("touchend", cancelHold);

        twitter.addEventListener("click", (e) => {
            if (suppressNextClick) {
                e.preventDefault();
                e.stopPropagation();
                suppressNextClick = false;
                return;
            }

            if (!isToggled) {
                e.preventDefault();
                e.stopPropagation();
            }
        });


        document.addEventListener("contextmenu", (e) => {
            e.preventDefault();
        });
    </script>
